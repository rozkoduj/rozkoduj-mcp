[project]
name = "rozkoduj-mcp"
version = "2026.4.2"
description = "MCP server for AI-powered market screening and technical analysis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.14"
authors = [
    { name = "Jacek Bogocz", email = "contact@rozkoduj.com" },
]
keywords = ["mcp", "trading", "screening", "technical-analysis", "market-data"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.14",
    "Topic :: Office/Business :: Financial :: Investment",
]
dependencies = [
    "mcp[cli]>=1.26.0,<2.0",
    "httpx>=0.28.0",
]

[project.scripts]
rozkoduj-mcp = "rozkoduj_mcp:main"

[project.urls]
Homepage = "https://rozkoduj.com"
Repository = "https://github.com/rozkoduj/rozkoduj-mcp"
Issues = "https://github.com/rozkoduj/rozkoduj-mcp/issues"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "anyio>=4.13",
    "mypy>=1.20.0",
    "ruff>=0.15.8",
    "pre-commit>=4.5",
    "coverage>=7.13",
]

[build-system]
requires = ["uv_build>=0.11.2,<0.12"]
build-backend = "uv_build"

[tool.ruff]
target-version = "py314"
line-length = 99

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "UP", "B", "SIM", "TCH", "RUF", "PTH", "PERF",
    "S", "T20", "C4", "A",
]
ignore = ["E501", "S101", "S104", "TC001"]

[tool.ruff.lint.isort]
known-first-party = ["rozkoduj_mcp"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
strict = true
python_version = "3.14"
warn_unreachable = true
enable_error_code = ["ignore-without-code", "redundant-expr", "truthy-bool"]

[tool.pytest.ini_options]
addopts = ["-ra", "-q", "--strict-markers", "--import-mode=importlib"]
testpaths = ["tests"]
pythonpath = ["src"]
xfail_strict = true

[tool.coverage.run]
source = ["rozkoduj_mcp"]

[tool.coverage.report]
exclude_lines = ["if __name__", "pragma: no cover"]
