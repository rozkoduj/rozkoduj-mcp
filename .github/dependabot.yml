version: 2
updates:
  # Refresh the SHA-pinned actions (pins without automation go stale).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  # uv.lock refresh - CI resolves with --locked, so updates land as PRs.
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: weekly
    groups:
      python:
        patterns: ["*"]
  # Digest-pinned base image + pinned uv stage in the Dockerfile.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
