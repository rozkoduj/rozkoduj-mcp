name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-cloudrun
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy only for a real push to main. A fork PR's CI run carries
    # workflow_run.event == 'pull_request'; gating on 'push' closes the
    # pwn-request vector where a fork names its branch 'main' to pass the
    # branches filter and ride a green CI conclusion straight into prod.
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: rozkoduj-mcp
          region: europe-west1
          source: .
          env_vars: MCP_TRANSPORT=streamable-http
          flags: --concurrency=50 --max-instances=3 --min-instances=0
